<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="signin.css">
    <title>Sign in</title>
</head>
<body>
    <div class="card">
        <div class="form_area">
         <form action="">
            <p class="title">Sign in</p>
            <div class="form_group">
                <label class="sub_title" for="name">Name</label>
            <input type="text" name="Name" id="name" class="style" placeholder="Enter your name">
            <br>
            <label class="sub_title" for="pass">Password</label>
            <input type="password" name="password" id="pass" class="style" placeholder="Enter your password">
            </div>
         <button type="submit" id="btn" class="btn">Sign in</button>
         <p>Create an account! <a class="link" href="signup.html">sign up</a></p>   
        </form></div>
    </div>
    <script src="signin.js"></script>
</body>
</html>
