<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="signup.css">
    <title>Sign up</title>
</head>
<body>
    <div class="card">
        <div class="form_area">
         <form action="">
            <p class="title">Sign up</p>
            <div class="form_group">
                <label class="sub_title" for="name">Name</label>
            <input type="text" name="Name" id="name" class="style" placeholder="Enter your name">
           <br>
            <label for="email" class="sub_title">E-mail</label>
            <input class="style" type="email" name="E-mail" id="email" placeholder="Enter your E-mail">
            <br>
            <label class="sub_title" for="pass">Password</label>
            <input type="password" name="password" id="pass" class="style" placeholder="Enter your password">
            </div>
         <button type="submit" id="btn" class="btn" >Sign up</button>
         <p>Have an account? <a class="link" href="signin.html">sign in</a></p>   
        </form></div>
    </div>
    <script src="signup.js"></script>
</body>
</html>
